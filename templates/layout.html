<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}OpenZerg{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            height: 100vh; 
            overflow: hidden;
            background: #1a1a2e;
            color: #eee;
        }
        
        .header {
            background: #16213e;
            padding: 0.75rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #0f3460;
        }
        .header h1 { font-size: 1.25rem; font-weight: 600; }
        .header .status { 
            font-size: 0.875rem; 
            color: #4ade80;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .header .status::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
        }
        .header nav {
            display: flex;
            gap: 1rem;
        }
        .header nav a {
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.875rem;
        }
        .header nav a:hover { color: #e2e8f0; }
        .header nav a.active { color: #4ade80; }
        
        .container { 
            display: flex; 
            height: calc(100vh - 52px);
        }
        
        .sidebar { 
            width: 220px; 
            background: #16213e; 
            border-right: 1px solid #0f3460;
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {
            padding: 1rem;
            border-bottom: 1px solid #0f3460;
            font-weight: 600;
            font-size: 0.875rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .session-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem 0;
        }
        .session-group {
            padding: 0.5rem 1rem;
        }
        .session-group-title {
            font-size: 0.75rem;
            color: #64748b;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        .session-item {
            padding: 0.5rem 0.75rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.875rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2px;
        }
        .session-item:hover { background: #1e293b; }
        .session-item.active { 
            background: #0f3460;
            color: #4ade80;
        }
        .session-item .id {
            font-family: 'SF Mono', 'Monaco', monospace;
            font-size: 0.8125rem;
        }
        .session-item .state {
            font-size: 0.6875rem;
            padding: 2px 6px;
            border-radius: 3px;
            background: #1e293b;
            color: #94a3b8;
        }
        .session-item.active .state { background: #0f3460; }
        
        .main { 
            flex: 1; 
            display: flex; 
            flex-direction: column;
            background: #0f172a;
        }
        .messages { 
            flex: 1; 
            overflow-y: auto; 
            padding: 1.5rem;
        }
        .message {
            margin-bottom: 1rem;
            padding: 1rem;
            border-radius: 8px;
            background: #1e293b;
        }
        .message.user {
            background: #16213e;
            margin-left: 2rem;
        }
        .message.assistant {
            margin-right: 2rem;
        }
        .message.thinking {
            background: #1a1a2e;
            border-left: 3px solid #fbbf24;
        }
        .message.thinking .role {
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .message.thinking .role::after {
            content: '▼';
            font-size: 0.625rem;
            transition: transform 0.2s;
        }
        .message.thinking.collapsed .role::after {
            transform: rotate(-90deg);
        }
        .message.thinking.collapsed .content {
            display: none;
        }
        .message.thinking .toggle-hint {
            font-size: 0.625rem;
            color: #64748b;
            font-weight: 400;
        }
        .message .role {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            font-weight: 600;
        }
        .message .content {
            white-space: pre-wrap;
            font-size: 0.875rem;
            line-height: 1.5;
        }
        .message .content code {
            background: #0f172a;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 0.8125rem;
        }
        
        .input-area { 
            padding: 1rem 1.5rem;
            border-top: 1px solid #0f3460;
            background: #16213e;
        }
        .input-area form {
            display: flex;
            gap: 0.75rem;
        }
        .input-area input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 1px solid #0f3460;
            border-radius: 6px;
            background: #0f172a;
            color: #eee;
            font-size: 0.875rem;
        }
        .input-area input:focus {
            outline: none;
            border-color: #4ade80;
        }
        .input-area input::placeholder { color: #64748b; }
        .input-area button {
            padding: 0.75rem 1.5rem;
            background: #4ade80;
            color: #0f172a;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.875rem;
        }
        .input-area button:hover { background: #22c55e; }
        .input-area.readonly {
            text-align: center;
            color: #64748b;
            font-size: 0.875rem;
            padding: 1.5rem;
        }
        .input-area.readonly a {
            color: #4ade80;
            text-decoration: none;
        }
        
        .panel { 
            width: 280px; 
            background: #16213e; 
            padding: 1.5rem;
            border-left: 1px solid #0f3460;
            overflow-y: auto;
        }
        .panel-section {
            margin-bottom: 1.5rem;
        }
        .panel-section h3 {
            font-size: 0.75rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.75rem;
            font-weight: 600;
        }
        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
            font-size: 0.875rem;
        }
        .stat-item .label { color: #94a3b8; }
        .stat-item .value { 
            font-weight: 600;
            font-family: 'SF Mono', 'Monaco', monospace;
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #0f172a;
            border-radius: 3px;
            overflow: hidden;
            margin: 0.5rem 0;
        }
        .progress-bar .fill {
            height: 100%;
            background: linear-gradient(90deg, #4ade80, #22c55e);
            transition: width 0.3s ease;
        }
        
        .task-list {
            font-size: 0.875rem;
        }
        .task-item {
            padding: 0.5rem 0;
            border-bottom: 1px solid #0f3460;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .task-item:last-child { border-bottom: none; }
        .task-item .status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .task-item .status.pending { background: #94a3b8; }
        .task-item .status.running { background: #4ade80; animation: pulse 1.5s infinite; }
        .task-item .status.completed { background: #22c55e; }
        .task-item .status.failed { background: #ef4444; }
        .task-item .title {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #64748b;
        }
        .empty-state h2 {
            margin-bottom: 0.5rem;
            color: #94a3b8;
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <header class="header">
        <div>
            <h1>OpenZerg Agent</h1>
        </div>
        <nav>
            <a href="/ui/">Dashboard</a>
            <a href="/ui/providers">Providers</a>
            <a href="/ui/config">Config</a>
        </nav>
        <div class="status">Running</div>
    </header>
    
    <div class="container">
        {% block sidebar %}{% endblock %}
        {% block content %}{% endblock %}
        {% block panel %}{% endblock %}
    </div>
    
    <script>
        // SSE connection management
        let eventSource = null;
        let currentSessionId = null;
        
        function connectSSE(sessionId) {
            if (eventSource) {
                eventSource.close();
                eventSource = null;
            }
            
            currentSessionId = sessionId;
            eventSource = new EventSource('/api/sessions/' + sessionId + '/events');
            
            eventSource.addEventListener('thinking', (e) => {
                const data = JSON.parse(e.data);
                appendThinking(data.content);
            });
            
            eventSource.addEventListener('tool_call', (e) => {
                const data = JSON.parse(e.data);
                appendToolCall(data.tool, data.args);
            });
            
            eventSource.addEventListener('tool_result', (e) => {
                const data = JSON.parse(e.data);
                appendToolResult(data.content);
            });
            
            eventSource.addEventListener('response', (e) => {
                const data = JSON.parse(e.data);
                appendResponse(data.content);
            });
            
            eventSource.addEventListener('done', (e) => {
                const data = JSON.parse(e.data);
                markComplete(data.session_id);
            });
            
            eventSource.addEventListener('error', (e) => {
                const data = JSON.parse(e.data);
                appendError(data.message);
            });
            
            eventSource.addEventListener('session_list_update', () => {
                location.reload();
            });
            
            eventSource.onerror = () => {
                console.log('SSE connection lost, reconnecting...');
                setTimeout(() => {
                    if (currentSessionId) {
                        connectSSE(currentSessionId);
                    }
                }, 3000);
            };
        }
        
        function appendThinking(content) {
            const messages = document.getElementById('messages');
            let thinkingDiv = messages.querySelector('.thinking.active-thinking');
            if (!thinkingDiv) {
                thinkingDiv = document.createElement('div');
                thinkingDiv.className = 'message thinking active-thinking';
                thinkingDiv.innerHTML = '<div class="role">Thinking<span class="toggle-hint"> (live)</span></div><div class="content"></div>';
                messages.appendChild(thinkingDiv);
            }
            thinkingDiv.querySelector('.content').textContent += content;
            messages.scrollTop = messages.scrollHeight;
        }
        
        function appendToolCall(tool, args) {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'message tool-call';
            div.innerHTML = '<div class="role">Tool Call</div><div class="content"><code>' + 
                tool + '</code>: ' + JSON.stringify(args, null, 2) + '</div>';
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }
        
        function appendToolResult(content) {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'message tool-result';
            div.innerHTML = '<div class="role">Tool Result</div><div class="content">' + 
                escapeHtml(content) + '</div>';
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }
        
        function appendResponse(content) {
            const messages = document.getElementById('messages');
            const thinking = messages.querySelector('.thinking.active-thinking');
            if (thinking) {
                thinking.classList.remove('active-thinking');
                thinking.classList.add('collapsed');
                const roleDiv = thinking.querySelector('.role');
                roleDiv.innerHTML = 'Thinking<span class="toggle-hint"> (click to expand)</span>';
                roleDiv.onclick = function() {
                    thinking.classList.toggle('collapsed');
                    const hint = roleDiv.querySelector('.toggle-hint');
                    if (thinking.classList.contains('collapsed')) {
                        hint.textContent = ' (click to expand)';
                    } else {
                        hint.textContent = ' (click to collapse)';
                    }
                };
            }
            
            const div = document.createElement('div');
            div.className = 'message assistant';
            div.innerHTML = '<div class="role">Assistant</div><div class="content">' + 
                escapeHtml(content) + '</div>';
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }
        
        function appendError(message) {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'message error';
            div.style.borderLeftColor = '#ef4444';
            div.innerHTML = '<div class="role" style="color: #ef4444;">Error</div><div class="content">' + 
                escapeHtml(message) + '</div>';
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function markComplete(sessionId) {
            // Could update UI to show completion
        }
        
        function switchSession(sessionId) {
            window.location.href = '/ui/sessions/' + sessionId;
        }
        
        function sendMessage(event) {
            event.preventDefault();
            const input = document.getElementById('message-input');
            const content = input.value.trim();
            if (!content) return;
            
            const sessionId = input.dataset.sessionId;
            
            // Add user message to UI
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'message user';
            div.innerHTML = '<div class="role">User</div><div class="content">' + 
                escapeHtml(content) + '</div>';
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
            
            // Clear input
            input.value = '';
            
            // Send to server
            fetch('/api/sessions/' + sessionId + '/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: content })
            }).catch(err => {
                console.error('Failed to send message:', err);
            });
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
