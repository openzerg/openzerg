<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}OpenZerg{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background: '#0a0a0f',
                        surface: '#12121a',
                        surfaceHover: '#1a1a25',
                        border: '#2a2a3a',
                        primary: '#6366f1',
                        primaryHover: '#818cf8',
                        accent: '#22d3ee',
                        muted: '#64748b',
                        text: '#e2e8f0',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        
        code, pre, .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }
        
        .scrollbar-thin::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        
        .scrollbar-thin::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .scrollbar-thin::-webkit-scrollbar-thumb {
            background: #2a2a3a;
            border-radius: 3px;
        }
        
        .scrollbar-thin::-webkit-scrollbar-thumb:hover {
            background: #3a3a4a;
        }
    </style>
</head>
<body class="bg-background text-text min-h-screen flex flex-col">
    <header class="bg-surface border-b border-border px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center">
                <span class="text-white font-bold text-sm">OZ</span>
            </div>
            <h1 class="text-lg font-semibold text-text">OpenZerg</h1>
        </div>
        <nav class="flex items-center gap-1">
            <a href="/ui/" class="px-4 py-2 text-sm text-muted hover:text-text hover:bg-surfaceHover rounded-lg transition-colors">Dashboard</a>
            <a href="/ui/providers" class="px-4 py-2 text-sm text-muted hover:text-text hover:bg-surfaceHover rounded-lg transition-colors">Providers</a>
            <a href="/ui/config" class="px-4 py-2 text-sm text-muted hover:text-text hover:bg-surfaceHover rounded-lg transition-colors">Config</a>
        </nav>
        <div class="flex items-center gap-2">
            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
            <span class="text-xs text-muted">Running</span>
        </div>
    </header>
    
    <div class="flex-1 flex overflow-hidden">
        {% block sidebar %}{% endblock %}
        {% block content %}{% endblock %}
        {% block panel %}{% endblock %}
    </div>
    
    <script>
        // Global SSE connection - established once per page load
        let globalEventSource = null;
        let currentSessionId = null;
        
        function connectGlobalSSE() {
            if (globalEventSource) return;
            
            globalEventSource = new EventSource('/api/events');
            
            globalEventSource.addEventListener('thinking', (e) => {
                const data = JSON.parse(e.data);
                // Show thinking for current session only
                if (!data.session_id || data.session_id === currentSessionId) {
                    appendThinking(data.content);
                }
            });
            
            globalEventSource.addEventListener('tool_call', (e) => {
                const data = JSON.parse(e.data);
                if (!data.session_id || data.session_id === currentSessionId) {
                    appendToolCall(data.tool, data.args);
                }
            });
            
            globalEventSource.addEventListener('tool_result', (e) => {
                const data = JSON.parse(e.data);
                if (!data.session_id || data.session_id === currentSessionId) {
                    appendToolResult(data.content);
                }
            });
            
            globalEventSource.addEventListener('response', (e) => {
                const data = JSON.parse(e.data);
                if (!data.session_id || data.session_id === currentSessionId) {
                    appendResponse(data.content);
                }
            });
            
            globalEventSource.addEventListener('done', (e) => {
                const data = JSON.parse(e.data);
                if (data.session_id === currentSessionId) {
                    markComplete(data.session_id);
                }
            });
            
            globalEventSource.addEventListener('error', (e) => {
                const data = JSON.parse(e.data);
                if (!data.session_id || data.session_id === currentSessionId) {
                    appendError(data.message);
                }
            });
            
            globalEventSource.onerror = () => {
                console.log('Global SSE connection lost, reconnecting...');
                globalEventSource = null;
                setTimeout(connectGlobalSSE, 3000);
            };
        }
        
        function connectSSE(sessionId) {
            currentSessionId = sessionId;
            connectGlobalSSE();
            
            eventSource.addEventListener('thinking', (e) => {
                const data = JSON.parse(e.data);
                // Show thinking for all sessions (including Dispatcher analysis)
                appendThinking(data.content);
            });
            
            eventSource.addEventListener('tool_call', (e) => {
                const data = JSON.parse(e.data);
                appendToolCall(data.tool, data.args);
            });
            
            eventSource.addEventListener('tool_result', (e) => {
                const data = JSON.parse(e.data);
                appendToolResult(data.content);
            });
            
            eventSource.addEventListener('response', (e) => {
                const data = JSON.parse(e.data);
                // Only show response for current session
                if (!data.session_id || data.session_id === currentSessionId) {
                    appendResponse(data.content);
                }
            });
            
            eventSource.addEventListener('done', (e) => {
                const data = JSON.parse(e.data);
                markComplete(data.session_id);
            });
            
            eventSource.addEventListener('error', (e) => {
                const data = JSON.parse(e.data);
                appendError(data.message);
            });
            
            eventSource.addEventListener('session_list_update', () => {
                location.reload();
            });
            
            eventSource.onerror = () => {
                console.log('SSE connection lost, reconnecting...');
                setTimeout(() => {
                    if (currentSessionId) {
                        connectSSE(currentSessionId);
                    }
                }, 3000);
            };
        }
        
        function appendThinking(content) {
            const messages = document.getElementById('messages');
            let thinkingDiv = messages.querySelector('.thinking.active-thinking');
            if (!thinkingDiv) {
                thinkingDiv = document.createElement('div');
                thinkingDiv.className = 'rounded-xl border bg-surface border-l-4 border-l-yellow-500 thinking active-thinking';
                thinkingDiv.innerHTML = '<div class="flex items-center gap-2 px-4 py-2.5 border-b border-yellow-500/20"><span class="text-xs font-semibold text-yellow-500 uppercase tracking-wider">Thinking</span><span class="text-xs text-muted thinking-hint"> (live)</span></div><div class="px-4 py-3"><div class="text-sm text-text leading-relaxed thinking-content whitespace-pre-wrap font-mono"></div></div>';
                messages.appendChild(thinkingDiv);
            }
            const contentDiv = thinkingDiv.querySelector('.thinking-content');
            if (contentDiv.textContent.length > 0) {
                contentDiv.textContent += ' | ' + content;
            } else {
                contentDiv.textContent = content;
            }
            messages.scrollTop = messages.scrollHeight;
        }
        
        function appendToolCall(tool, args) {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'message tool-call';
            div.innerHTML = '<div class="role">Tool Call</div><div class="content"><code>' + 
                tool + '</code>: ' + JSON.stringify(args, null, 2) + '</div>';
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }
        
        function appendToolResult(content) {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'message tool-result';
            div.innerHTML = '<div class="role">Tool Result</div><div class="content">' + 
                escapeHtml(content) + '</div>';
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }
        
        function appendResponse(content) {
            const messages = document.getElementById('messages');
            
            // Remove active thinking indicator
            const thinking = messages.querySelector('.thinking.active-thinking');
            if (thinking) {
                thinking.classList.remove('active-thinking');
                thinking.classList.add('collapsed');
                const roleDiv = thinking.querySelector('.thinking-hint');
                if (roleDiv) {
                    roleDiv.textContent = ' (click to expand)';
                }
                thinking.querySelector('.thinking-toggle')?.addEventListener('click', function() {
                    thinking.classList.toggle('collapsed');
                    const hint = this.querySelector('.thinking-hint');
                    if (hint) {
                        hint.textContent = thinking.classList.contains('collapsed') ? '(click to expand)' : '(click to collapse)';
                    }
                });
            }
            
            // Check if there's an existing assistant response to append to
            let assistantDiv = messages.querySelector('.assistant-response');
            if (!assistantDiv) {
                assistantDiv = document.createElement('div');
                assistantDiv.className = 'rounded-xl border bg-surface border-border assistant-response';
                assistantDiv.innerHTML = '<div class="flex items-center gap-2 px-4 py-2.5 border-b border-border"><span class="text-xs font-semibold text-accent uppercase tracking-wider">Assistant</span></div><div class="px-4 py-3"><div class="text-sm text-text leading-relaxed whitespace-pre-wrap font-mono assistant-content"></div></div>';
                messages.appendChild(assistantDiv);
            }
            
            const contentDiv = assistantDiv.querySelector('.assistant-content');
            if (contentDiv) {
                contentDiv.textContent += content;
            }
            
            messages.scrollTop = messages.scrollHeight;
        }
        
        function appendUserMessage(content) {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'rounded-xl border bg-primary/5 border-primary/20';
            div.innerHTML = '<div class="flex items-center gap-2 px-4 py-2.5 border-b border-primary/10"><span class="text-xs font-semibold text-primary uppercase tracking-wider">User</span></div><div class="px-4 py-3"><div class="text-sm text-text leading-relaxed whitespace-pre-wrap font-mono">' + 
                escapeHtml(content) + '</div></div>';
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }
        
        function appendError(message) {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'message error';
            div.style.borderLeftColor = '#ef4444';
            div.innerHTML = '<div class="role" style="color: #ef4444;">Error</div><div class="content">' + 
                escapeHtml(message) + '</div>';
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function markComplete(sessionId) {
            // Could update UI to show completion
        }
        
        // Switch session without page reload - SPA style
        async function switchSessionView(sessionId) {
            // Update sidebar active state - remove highlight from all sessions
            document.querySelectorAll('[onclick^="switchSessionView"]').forEach(el => {
                el.classList.remove('bg-primary/10', 'text-primary');
                el.classList.add('hover:bg-surfaceHover', 'text-muted');
            });
            
            // Find and highlight clicked session
            const clickedEl = document.querySelector(`[onclick="switchSessionView('${sessionId}')"]`);
            if (clickedEl) {
                clickedEl.classList.remove('hover:bg-surfaceHover', 'text-muted');
                clickedEl.classList.add('bg-primary/10', 'text-primary');
            }
            
            // Update current session ID for SSE filtering
            currentSessionId = sessionId;
            
            // Fetch new session data
            try {
                const [sessionResp, messagesResp] = await Promise.all([
                    fetch('/api/sessions/' + sessionId),
                    fetch('/api/sessions/' + sessionId + '/messages')
                ]);
                
                const sessionData = await sessionResp.json();
                const messagesData = await messagesResp.json();
                
                const session = sessionData.data;
                const messages = messagesData.data.messages;
                
                // Update page title
                document.title = 'Session ' + session.id.substring(0, 8) + ' - OpenZerg';
                
                // Update messages area
                const messagesDiv = document.getElementById('messages');
                messagesDiv.innerHTML = '';
                
                // System prompt
                if (session.system_prompt) {
                    const sysPrompt = document.createElement('details');
                    sysPrompt.className = 'group bg-surface rounded-xl border border-border overflow-hidden';
                    sysPrompt.innerHTML = '<summary class="flex items-center justify-between px-4 py-3 cursor-pointer bg-surfaceHover/50 hover:bg-surfaceHover transition-colors"><div class="flex items-center gap-2"><svg class="w-4 h-4 text-primary transition-transform group-open:rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg><span class="text-xs font-semibold text-primary uppercase tracking-wider">System Prompt</span></div><span class="text-xs text-muted">Click to expand</span></summary><div class="px-4 py-3 border-t border-border"><pre class="text-xs text-muted whitespace-pre-wrap font-mono leading-relaxed max-h-96 overflow-y-auto scrollbar-thin">' + escapeHtml(session.system_prompt) + '</pre></div></summary></details>';
                    messagesDiv.appendChild(sysPrompt);
                }
                
                // Messages
                messages.forEach(msg => {
                    const msgDiv = document.createElement('div');
                    const borderClass = msg.role === 'User' ? 'bg-primary/5 border-primary/20' : msg.role === 'Thinking' ? 'bg-surface border-l-4 border-l-yellow-500' : 'bg-surface border-border';
                    const textClass = msg.role === 'User' ? 'text-primary' : msg.role === 'Assistant' ? 'text-accent' : msg.role === 'Thinking' ? 'text-yellow-500' : 'text-muted';
                    const thinkingClass = msg.role === 'Thinking' ? 'thinking-msg collapsed' : '';
                    const thinkingToggle = msg.role === 'Thinking' ? 'thinking-toggle cursor-pointer' : '';
                    const thinkingHint = msg.role === 'Thinking' ? '<span class="text-xs text-muted thinking-hint">(click to expand)</span>' : '';
                    const thinkingContent = msg.role === 'Thinking' ? 'thinking-content' : '';
                    
                    msgDiv.className = `rounded-xl border ${borderClass} ${thinkingClass}`;
                    msgDiv.innerHTML = `<div class="flex items-center gap-2 px-4 py-2.5 border-b ${msg.role === 'User' ? 'border-primary/10' : msg.role === 'Thinking' ? 'border-yellow-500/20' : 'border-border'} ${thinkingToggle}"><span class="text-xs font-semibold ${textClass} uppercase tracking-wider">${msg.role}</span>${thinkingHint}</div><div class="px-4 py-3"><div class="text-sm text-text leading-relaxed ${thinkingContent} whitespace-pre-wrap font-mono">${escapeHtml(msg.content)}</div></div>`;
                    messagesDiv.appendChild(msgDiv);
                });
                
                // Update input area
                const inputArea = document.querySelector('.p-4.border-t.border-border.bg-surface, .p-4.border-t.border-border.bg-surface\\/50');
                if (inputArea) {
                    if (session.purpose === 'Main') {
                        inputArea.className = 'p-4 border-t border-border bg-surface flex-shrink-0';
                        inputArea.innerHTML = '<form id="message-form" class="flex gap-3" onsubmit="sendMessage(event, \'' + sessionId + '\')"><input type="text" id="message-input" placeholder="Type a message..." class="flex-1 px-4 py-3 bg-background border border-border rounded-xl text-text placeholder-muted focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" /><button type="submit" id="send-btn" class="px-6 py-3 bg-primary hover:bg-primaryHover text-white font-medium rounded-xl transition-colors flex items-center gap-2"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>Send</button></button></form>';
                    } else {
                        inputArea.className = 'p-4 border-t border-border bg-surface/50 text-center flex-shrink-0';
                        inputArea.innerHTML = '<p class="text-sm text-muted">This is a <span class="text-text font-medium">' + session.purpose + '</span> session. <a href="/ui/sessions/' + sessionId + '" class="text-primary hover:underline">Open Main Session</a> to chat.</p>';
                    }
                }
                
                // Update context panel
                const contextDiv = document.querySelector('.w-80.bg-surface');
                if (contextDiv && session.context) {
                    contextDiv.innerHTML = '<div class="mb-6"><h3 class="text-xs font-semibold text-muted uppercase tracking-wider mb-4">Context</h3><div class="space-y-3"><div class="flex justify-between items-center py-2 border-b border-border"><span class="text-sm text-muted">Tokens</span><span class="text-sm font-mono text-text">' + session.context.total_tokens + '</span></div><div class="h-2 bg-background rounded-full overflow-hidden"><div class="h-full bg-gradient-to-r from-primary to-accent rounded-full transition-all" style="width: ' + session.context.usage_percent + '%"></div></div><div class="flex justify-between items-center py-2 border-b border-border"><span class="text-sm text-muted">Usage</span><span class="text-sm font-mono text-text">' + session.context.usage_percent + '%</span></div><div class="flex justify-between items-center py-2 border-b border-border"><span class="text-sm text-muted">Messages</span><span class="text-sm font-mono text-text">' + session.context.message_count + '</span></div></div></div>';
                }
                
                // Add thinking toggle handlers
                document.querySelectorAll('.thinking-toggle').forEach(function(toggle) {
                    toggle.addEventListener('click', function() {
                        const msgDiv = this.closest('.thinking-msg');
                        msgDiv.classList.toggle('collapsed');
                        const hint = this.querySelector('.thinking-hint');
                        if (hint) {
                            hint.textContent = msgDiv.classList.contains('collapsed') ? '(click to expand)' : '(click to collapse)';
                        }
                    });
                });
                
            } catch (err) {
                console.error('Failed to load session:', err);
            }
        }
        
        function switchSession(sessionId) {
            window.location.href = '/ui/sessions/' + sessionId;
        }
        
        async function sendMessage(event, sessionId) {
            event.preventDefault();
            const input = document.getElementById('message-input');
            const sendBtn = document.getElementById('send-btn');
            const content = input.value.trim();
            if (!content) return;
            
            // Add user message to UI immediately (optimistic update)
            appendUserMessage(content);
            
            // Disable input and button while sending
            input.disabled = true;
            sendBtn.disabled = true;
            sendBtn.classList.add('opacity-50');
            input.value = '';
            
            try {
                const response = await fetch('/api/sessions/' + sessionId + '/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: content })
                });
                
                if (!response.ok) {
                    console.error('Failed to send message:', response.status);
                    input.value = content; // Restore content on error
                }
            } catch (err) {
                console.error('Error sending message:', err);
                input.value = content; // Restore content on error
            } finally {
                // Re-enable input and button
                input.disabled = false;
                sendBtn.disabled = false;
                sendBtn.classList.remove('opacity-50');
                input.focus();
            }
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
